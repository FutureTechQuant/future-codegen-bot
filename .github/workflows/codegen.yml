name: codegen

on:
  workflow_dispatch:
  push:
    paths:
      - "sql/**"
      - "tools/**"
      - ".github/workflows/codegen.yml"

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Checkout ruoyi-vue-pro (latest)
        uses: actions/checkout@v5
        with:
          repository: YunaiV/ruoyi-vue-pro
          ref: master-jdk17
          path: ruoyi
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ruoyi/pom.xml

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client gh rsync

      - name: Run codegen
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PWD: root
          CODEGEN_BASE_PACKAGE: cn.iocoder.yudao
        run: |
          bash tools/codegen/run.sh

      - name: Publish generated code
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: FutureTechQuant
        run: |
          bash tools/codegen/publish.sh

      - name: Upload generated code
        uses: actions/upload-artifact@v5
        with:
          name: generated-code
          path: out/generated
