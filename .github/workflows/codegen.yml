name: codegen

on:
  workflow_dispatch:
  push:
    branches: [ master-jdk17 ]
    paths:
      - "sql/**"
      - "tools/**"
      - "templates/**"
      - ".github/workflows/codegen.yml"

permissions:
  contents: read

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Checkout ruoyi-vue-pro for codegen engine
        uses: actions/checkout@v5
        with:
          repository: YunaiV/ruoyi-vue-pro
          ref: master-jdk17
          path: ruoyi
          fetch-depth: 1

      - name: Debug .vm template sources
        run: |
          set -euo pipefail
          cd ruoyi

          echo "== find all .vm files =="
          find . -type f -name '*.vm' | sort || true

          echo "== search old codegen variables in .vm templates =="
          git grep -n -E '\$\{saveReqVOClass\}|\$\{saveReqVOVar\}|\$\{updateReqVOClass\}|\$\{updateReqVOVar\}|\$\{respVOClass\}|\$\{table.classComment\}' -- '*.vm' || true

          echo "== search controller templates =="
          find . -type f -name '*controller*.vm' | sort || true

          echo "== search service templates =="
          find . -type f \( -name '*service*.vm' -o -name '*Service*.vm' \) | sort || true

      - name: Preview matched .vm templates
        run: |
          set -euo pipefail
          cd ruoyi

          files="$(git grep -l -E '\$\{saveReqVOClass\}|\$\{saveReqVOVar\}|\$\{updateReqVOClass\}|\$\{updateReqVOVar\}|\$\{respVOClass\}|\$\{table.classComment\}' -- '*.vm' || true)"

          if [[ -z "${files}" ]]; then
            echo "No matched .vm templates found"
            exit 0
          fi

          while IFS= read -r f; do
            [[ -z "${f}" ]] && continue
            echo "=================================================="
            echo "FILE: ${f}"
            echo "=================================================="
            nl -ba "${f}" | sed -n '1,240p'
          done <<< "${files}"

      - name: Debug template vars in repo
        run: |
          set -euo pipefail
          cd ruoyi

          echo "== search old template vars in whole repo =="
          git grep -n -E '\$\{saveReqVOClass\}|\$\{saveReqVOVar\}|\$\{updateReqVOClass\}|\$\{updateReqVOVar\}|\$\{respVOClass\}|\$\{table.classComment\}' || true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ruoyi/pom.xml

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client python3

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FutureTechQuant

      - name: Run codegen
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PWD: root
          CODEGEN_BASE_PACKAGE: cn.iocoder.yudao
        run: |
          bash tools/codegen/run.sh

      - name: Debug codegen metadata in MySQL
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PWD: root
        run: |
          set -euo pipefail

          mysql_cmd() {
            mysql -h"${MYSQL_HOST}" -P"${MYSQL_PORT}" -u"${MYSQL_USER}" --batch --raw --skip-column-names "$@"
          }

          CODEGEN_SCHEMA="$(mysql_cmd -e "
            SELECT t1.table_schema
            FROM information_schema.tables t1
            JOIN information_schema.tables t2
              ON t1.table_schema = t2.table_schema
            WHERE t1.table_name = 'infra_codegen_table'
              AND t2.table_name = 'infra_codegen_column'
            ORDER BY t1.table_schema
            LIMIT 1;
          ")"

          if [[ -z "${CODEGEN_SCHEMA}" ]]; then
            echo "WARNING: cannot find schema containing infra_codegen_table and infra_codegen_column"
            echo "Available schemas:"
            mysql_cmd -e "SHOW DATABASES;"
            exit 0
          fi

          echo "Detected codegen schema: ${CODEGEN_SCHEMA}"

          echo "== infra_codegen_table / infra_codegen_column counts =="
          mysql_cmd -e "
            SELECT 'infra_codegen_table', COUNT(*) FROM \`${CODEGEN_SCHEMA}\`.infra_codegen_table
            UNION ALL
            SELECT 'infra_codegen_column', COUNT(*) FROM \`${CODEGEN_SCHEMA}\`.infra_codegen_column;
          "

          echo "== latest infra_codegen_table rows =="
          mysql_cmd -e "
            SELECT id, table_name, table_comment, class_name, class_comment, module_name, business_name
            FROM \`${CODEGEN_SCHEMA}\`.infra_codegen_table
            ORDER BY id DESC
            LIMIT 30;
          "

          echo "== latest infra_codegen_column rows =="
          mysql_cmd -e "
            SELECT id, table_id, column_name, column_comment, java_type, java_field, html_type, dict_type
            FROM \`${CODEGEN_SCHEMA}\`.infra_codegen_column
            ORDER BY id DESC
            LIMIT 80;
          "

          echo "== talent_* related rows from infra_codegen_table =="
          mysql_cmd -e "
            SELECT id, table_name, table_comment, class_name, class_comment, module_name, business_name
            FROM \`${CODEGEN_SCHEMA}\`.infra_codegen_table
            WHERE table_name LIKE 'talent_%'
               OR class_name LIKE '%Talent%'
               OR business_name LIKE '%talent%'
            ORDER BY id;
          "

          echo "== talent_* related rows from infra_codegen_column =="
          mysql_cmd -e "
            SELECT c.id, c.table_id, t.table_name, c.column_name, c.column_comment, c.java_type, c.java_field
            FROM \`${CODEGEN_SCHEMA}\`.infra_codegen_column c
            JOIN \`${CODEGEN_SCHEMA}\`.infra_codegen_table t ON c.table_id = t.id
            WHERE t.table_name LIKE 'talent_%'
               OR t.class_name LIKE '%Talent%'
               OR t.business_name LIKE '%talent%'
            ORDER BY t.table_name, c.id;
          "

      - name: Debug unreplaced template variables
        run: |
          set -euo pipefail

          echo "== search unreplaced template variables in generated output =="
          if grep -R '\\${' -n out/generated; then
            echo "WARNING: found unreplaced template variables in generated files"
          else
            echo "OK: no unreplaced template variables found under out/generated"
          fi

      - name: Recreate target repos from Gitee
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_OWNER: FutureTechQuant
          TARGET_REPO_VISIBILITY: public
          RECREATE_TIMEOUT_SECONDS: 900
          BACKEND_BRANCH: master-jdk17
        run: |
          set -euo pipefail

          OWNER="${GITHUB_OWNER}"
          VISIBILITY="${TARGET_REPO_VISIBILITY:-public}"
          TIMEOUT_SECONDS="${RECREATE_TIMEOUT_SECONDS:-900}"
          BACKEND_BRANCH="${BACKEND_BRANCH:-master-jdk17}"

          BACKEND_REPO="ruoyi-vue-pro"
          FRONTEND_REPO="yudao-ui-admin-vue3"

          BACKEND_UPSTREAM="https://gitee.com/zhijiantianya/ruoyi-vue-pro.git"
          FRONTEND_UPSTREAM="https://gitee.com/yudaocode/yudao-ui-admin-vue3.git"

          git config --global user.name "future-codegen-bot"
          git config --global user.email "actions@users.noreply.github.com"

          repo_url() {
            local repo="$1"
            echo "https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/${repo}.git"
          }

          wait_until_deleted() {
            local repo="$1"
            local deadline=$((SECONDS + TIMEOUT_SECONDS))

            while gh repo view "${OWNER}/${repo}" >/dev/null 2>&1; do
              if (( SECONDS >= deadline )); then
                echo "ERROR: timeout waiting delete for ${OWNER}/${repo}"
                exit 1
              fi
              sleep 5
            done
          }

          create_repo_with_retry() {
            local repo="$1"
            local deadline=$((SECONDS + TIMEOUT_SECONDS))
            local log="/tmp/create-${repo}.log"

            while true; do
              rm -f "${log}"

              if [[ "${VISIBILITY}" == "public" ]]; then
                if gh repo create "${OWNER}/${repo}" --public >"${log}" 2>&1; then
                  return
                fi
              else
                if gh repo create "${OWNER}/${repo}" --private >"${log}" 2>&1; then
                  return
                fi
              fi

              if grep -q "Name already exists on this account" "${log}"; then
                if (( SECONDS >= deadline )); then
                  cat "${log}"
                  echo "ERROR: timeout waiting name reusable for ${OWNER}/${repo}"
                  exit 1
                fi
                sleep 10
                continue
              fi

              cat "${log}"
              echo "ERROR: create repo failed: ${OWNER}/${repo}"
              exit 1
            done
          }

          recreate_from_upstream() {
            local repo="$1"
            local upstream="$2"
            local branch="${3:-}"
            local seed_dir="${RUNNER_TEMP}/seed-${repo}"

            echo "==> recreate ${OWNER}/${repo}"

            if gh repo view "${OWNER}/${repo}" >/dev/null 2>&1; then
              gh repo delete "${OWNER}/${repo}" --yes
            fi

            wait_until_deleted "${repo}"
            create_repo_with_retry "${repo}"

            rm -rf "${seed_dir}"
            if [[ -n "${branch}" ]]; then
              git clone --branch "${branch}" --single-branch "${upstream}" "${seed_dir}"
            else
              git clone "${upstream}" "${seed_dir}"
            fi

            git -C "${seed_dir}" remote remove origin || true
            git -C "${seed_dir}" remote add origin "$(repo_url "${repo}")"

            if [[ -n "${branch}" ]]; then
              git -C "${seed_dir}" push -u origin "HEAD:${branch}"
            else
              git -C "${seed_dir}" push -u origin HEAD
            fi
          }

          recreate_from_upstream "${BACKEND_REPO}" "${BACKEND_UPSTREAM}" "${BACKEND_BRANCH}"
          recreate_from_upstream "${FRONTEND_REPO}" "${FRONTEND_UPSTREAM}"

      - name: Publish generated code
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_OWNER: FutureTechQuant
          BACKEND_BRANCH: master-jdk17
        run: |
          bash tools/codegen/publish.sh

      - name: Upload generated code
        uses: actions/upload-artifact@v5
        with:
          name: generated-code
          path: out/generated
