name: codegen

on:
  workflow_dispatch:
  push:
    branches: [ master-jdk17 ]
    paths:
      - "sql/**"
      - "tools/**"
      - "templates/**"
      - ".github/workflows/codegen.yml"

permissions:
  contents: read

concurrency:
  group: codegen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Checkout ruoyi-vue-pro for codegen engine
        uses: actions/checkout@v5
        with:
          repository: YunaiV/ruoyi-vue-pro
          ref: master-jdk17
          path: ruoyi
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ruoyi/pom.xml

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client python3 redis-tools git jq

      - name: Wait MySQL
        run: |
          for i in $(seq 1 60); do
            mysqladmin ping -h 127.0.0.1 -proot --silent && exit 0
            sleep 2
          done
          echo "MySQL not ready"
          exit 1

      - name: Wait Redis
        run: |
          for i in $(seq 1 30); do
            redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG && exit 0
            sleep 2
          done
          echo "Redis not ready"
          exit 1

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FutureTechQuant

      # 注意：从这一步开始，使用的是 GitHub App token，具备 delete/create repo 权限
      - name: Delete and recreate target repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_OWNER: FutureTechQuant
        run: |
          set -euo pipefail

          owner="${GITHUB_OWNER}"
          token="${GH_TOKEN}"

          api() {
            local method="$1"
            local url="$2"
            shift 2
            curl -sS -X "${method}" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$@" "${url}"
          }

          delete_repo_if_exists() {
            local repo="$1"
            local url="https://api.github.com/repos/${owner}/${repo}"

            echo "==> Check and delete repo if exists: ${owner}/${repo}"
            status=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${url}")

            if [[ "${status}" == "404" ]]; then
              echo "Repo ${owner}/${repo} not found, skip delete"
              return
            fi

            if [[ "${status}" != "200" ]]; then
              echo "WARN: Unexpected status when getting ${owner}/${repo}: ${status}"
            fi

            del_status=$(curl -sS -o /dev/null -w "%{http_code}" \
              -X DELETE \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${url}")

            if [[ "${del_status}" == "204" ]]; then
              echo "Deleted repo ${owner}/${repo}"
            else
              echo "ERROR: Failed to delete ${owner}/${repo}, status=${del_status}"
              exit 1
            fi
          }

          create_repo() {
            local repo="$1"
            local is_private="$2"  # true / false
            local desc="$3"

            echo "==> Create repo ${owner}/${repo}"
            payload=$(jq -n \
              --arg name "${repo}" \
              --argjson private "${is_private}" \
              --arg desc "${desc}" \
              '{name: $name, private: $private, description: $desc, auto_init: false}')

            create_status=$(curl -sS -o /tmp/create-"${repo}".json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "${payload}" \
              "https://api.github.com/orgs/${owner}/repos")

            if [[ "${create_status}" != "201" ]]; then
              echo "ERROR: Failed to create repo ${owner}/${repo}, status=${create_status}"
              echo "Response:"
              cat /tmp/create-"${repo}".json || true
              exit 1
            fi

            echo "Created repo ${owner}/${repo}"
          }

          # 这里你可以按需要决定 private true/false
          delete_repo_if_exists "ruoyi-vue-pro"
          delete_repo_if_exists "yudao-ui-admin-vue3"

          create_repo "ruoyi-vue-pro" true "Auto recreated by future-codegen-bot"
          create_repo "yudao-ui-admin-vue3" true "Auto recreated by future-codegen-bot"

      - name: Run codegen
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PWD: root
          CODEGEN_DB_NAME: ruoyi-vue-pro
          CODEGEN_MODULE_NAME: talent
          CODEGEN_TABLE_PREFIX: talent_
          CODEGEN_OUTPUT_DIR: ${{ github.workspace }}/out/generated
          CODEGEN_BASE_PACKAGE: cn.iocoder.yudao
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          bash tools/codegen/run.sh

      - name: Publish generated code
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_OWNER: FutureTechQuant
          BACKEND_BRANCH: master-jdk17
        run: |
          bash tools/codegen/publish.sh

      - name: Upload generated code
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: generated-code
          path: out/generated
          if-no-files-found: error
          retention-days: 7
