name: codegen

on:
  workflow_dispatch:
  push:
    branches: [ master-jdk17 ]
    paths:
      - "sql/**"
      - "tools/**"
      - "templates/**"
      - ".github/workflows/codegen.yml"

permissions:
  contents: read

concurrency:
  group: codegen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5

      # 用 Gitee 的 ruoyi 作为代码生成引擎（也可以继续用 GitHub 版，看你需要）
      - name: Checkout ruoyi-vue-pro for codegen engine
        uses: actions/checkout@v5
        with:
          repository: YunaiV/ruoyi-vue-pro
          ref: master-jdk17
          path: ruoyi
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ruoyi/pom.xml

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client python3 redis-tools git jq

      - name: Wait MySQL
        run: |
          for i in $(seq 1 60); do
            mysqladmin ping -h 127.0.0.1 -proot --silent && exit 0
            sleep 2
          done
          echo "MySQL not ready"
          exit 1

      - name: Wait Redis
        run: |
          for i in $(seq 1 30); do
            redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG && exit 0
            sleep 2
          done
          echo "Redis not ready"
          exit 1

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FutureTechQuant

      - name: Run codegen
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PWD: root
          CODEGEN_DB_NAME: ruoyi-vue-pro
          CODEGEN_MODULE_NAME: talent
          CODEGEN_TABLE_PREFIX: talent_
          CODEGEN_OUTPUT_DIR: ${{ github.workspace }}/out/generated
          CODEGEN_BASE_PACKAGE: cn.iocoder.yudao
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          bash tools/codegen/run.sh

      - name: Publish generated code
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_OWNER: FutureTechQuant
          BACKEND_BRANCH: master-jdk17
        run: |
          bash tools/codegen/publish.sh

      - name: Upload generated code
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: generated-code
          path: out/generated
          if-no-files-found: error
          retention-days: 7
