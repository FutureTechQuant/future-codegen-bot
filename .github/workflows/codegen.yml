name: codegen

on:
  workflow_dispatch:
  push:
    paths:
      - "sql/**"
      - "tools/**"
      - ".github/workflows/codegen.yml"

permissions:
  contents: read

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Checkout ruoyi-vue-pro for codegen engine
        uses: actions/checkout@v5
        with:
          repository: YunaiV/ruoyi-vue-pro
          ref: master-jdk17
          path: ruoyi
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ruoyi/pom.xml

      - name: Install mysql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client python3

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FutureTechQuant

      - name: Run codegen
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PWD: root
          CODEGEN_BASE_PACKAGE: cn.iocoder.yudao
        run: |
          bash tools/codegen/run.sh

      - name: Recreate target repos and publish generated code
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_OWNER: FutureTechQuant
          TARGET_REPO_VISIBILITY: private
        run: |
          bash tools/codegen/publish.sh

      - name: Upload generated code
        uses: actions/upload-artifact@v5
        with:
          name: generated-code
          path: out/generated
